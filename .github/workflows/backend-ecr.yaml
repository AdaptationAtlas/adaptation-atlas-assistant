name: Build and push backend docker image 

on:
  push:
    branches: [ "main"]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/backend-ecr.yaml'

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image (SHA tag)
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          SHORT_SHA="sha-${GITHUB_SHA::7}"
          IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}"
          TAGS="$IMAGE:$SHORT_SHA"
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi

          echo "Building and pushing $IMAGE with tags: $TAGS"
          docker build -t "$IMAGE:$SHORT_SHA" -f backend/Dockerfile backend
          docker push "$IMAGE:$SHORT_SHA"
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag "$IMAGE:$SHORT_SHA" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi

          echo "Image pushed: $IMAGE:$SHORT_SHA"